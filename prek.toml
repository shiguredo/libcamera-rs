# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

fail_fast = true

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files" },
  { id = "detect-private-key" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    entry = "cargo fmt --all -- --check",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "clang-format",
    name = "clang-format",
    entry = "clang-format --dry-run --Werror",
    language = "system",
    types_or = ["c", "c++"],
    files = "^c-api/",
    priority = 5,
  },
  {
    id = "cargo-clippy",
    name = "cargo clippy",
    # macOS では Apple Container 上の Linux コンテナで aarch64-unknown-linux-gnu ターゲットの clippy を実行する
    # 事前に `make container-build` でイメージ (libcamera-rs-check) を用意しておくこと
    # ソースは bind mount するので Rust ファイルの編集はコンテナ再ビルドなしで反映される
    # ホストの target/ と衝突しないようコンテナ内では CARGO_TARGET_DIR=/tmp/cargo-target を使う
    entry = "sh -c 'case \"$(uname -s)\" in Darwin) container run --rm -v \"$(pwd):/workspace\" -w /workspace -e CARGO_TARGET_DIR=/tmp/cargo-target libcamera-rs-check cargo clippy --workspace --all-targets --target aarch64-unknown-linux-gnu -- -D warnings;; *) cargo clippy --workspace --all-targets -- -D warnings;; esac'",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 10,
  },
  {
    id = "cargo-test",
    name = "cargo test",
    # macOS では Apple Container 上の Linux コンテナで aarch64-unknown-linux-gnu ターゲットのテストを実行する
    # 事前に `make container-build` でイメージ (libcamera-rs-check) を用意しておくこと
    # ソースは bind mount するので Rust ファイルの編集はコンテナ再ビルドなしで反映される
    # ホストの target/ と衝突しないようコンテナ内では CARGO_TARGET_DIR=/tmp/cargo-target を使う
    entry = "sh -c 'case \"$(uname -s)\" in Darwin) container run --rm -v \"$(pwd):/workspace\" -w /workspace -e CARGO_TARGET_DIR=/tmp/cargo-target libcamera-rs-check cargo test --workspace --target aarch64-unknown-linux-gnu;; *) cargo test --workspace --all-targets;; esac'",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 20,
  },
]
