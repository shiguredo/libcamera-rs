name: ci

on:
  push:
    paths:
      - "c-api/**"
      - "src/**"
      - "examples/**"
      - "sysroot/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
  schedule:
    # JST 11:00 (UTC 02:00), 月-金
    - cron: "0 2 * * 1-5"

jobs:
  build:
    name: Build (aarch64)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      SYSROOT_PATH: ${{ github.workspace }}/target/shiguredo-sysroot/raspberry-pi-os_armv8/sysroot
      PKG_CONFIG_ALLOW_CROSS: "1"
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: rustup update stable
      - run: rustup target add aarch64-unknown-linux-gnu
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libclang-dev \
            clang \
            debian-archive-keyring \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu
          # cargo-shiguredo-sysroot は独自 apt 設定で sources.list のみ差し替えるため、
          # Debian の keyring を trusted.gpg.d に配置しないと trixie の署名検証に失敗する。
          sudo install -Dm644 /usr/share/keyrings/debian-archive-keyring.gpg \
            /etc/apt/trusted.gpg.d/debian-archive-keyring.gpg
          # Raspberry Pi アーカイブの keyring をインストールし trusted.gpg.d に配置する
          curl -fsSL http://archive.raspberrypi.com/debian/pool/main/r/raspberrypi-archive-keyring/raspberrypi-archive-keyring_2021.1.1+rpt1_all.deb \
            -o /tmp/rpi-keyring.deb && sudo dpkg -i /tmp/rpi-keyring.deb && rm /tmp/rpi-keyring.deb
          sudo install -Dm644 /usr/share/keyrings/raspberrypi-archive-keyring.gpg \
            /etc/apt/trusted.gpg.d/raspberrypi-archive-keyring.gpg
      - name: Install cargo-shiguredo-sysroot
        run: cargo install shiguredo_sysroot
      - name: Install sysroot
        run: cargo shiguredo-sysroot --config sysroot/raspberry-pi-os_armv8.json
      - run: cargo fmt --all --check
      - name: Check
        env:
          PKG_CONFIG_SYSROOT_DIR: ${{ env.SYSROOT_PATH }}
          PKG_CONFIG_LIBDIR: ${{ env.SYSROOT_PATH }}/usr/lib/aarch64-linux-gnu/pkgconfig:${{ env.SYSROOT_PATH }}/usr/share/pkgconfig
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu: "--target=aarch64-linux-gnu --sysroot=${{ env.SYSROOT_PATH }}"
        run: cargo check --workspace --target aarch64-unknown-linux-gnu
      - name: Clippy
        env:
          PKG_CONFIG_SYSROOT_DIR: ${{ env.SYSROOT_PATH }}
          PKG_CONFIG_LIBDIR: ${{ env.SYSROOT_PATH }}/usr/lib/aarch64-linux-gnu/pkgconfig:${{ env.SYSROOT_PATH }}/usr/share/pkgconfig
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu: "--target=aarch64-linux-gnu --sysroot=${{ env.SYSROOT_PATH }}"
        run: cargo clippy --workspace --target aarch64-unknown-linux-gnu -- -D warnings
      - name: Build examples
        env:
          PKG_CONFIG_SYSROOT_DIR: ${{ env.SYSROOT_PATH }}
          PKG_CONFIG_LIBDIR: ${{ env.SYSROOT_PATH }}/usr/lib/aarch64-linux-gnu/pkgconfig:${{ env.SYSROOT_PATH }}/usr/share/pkgconfig
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu: "--target=aarch64-linux-gnu --sysroot=${{ env.SYSROOT_PATH }}"
        run: cargo build --examples --target aarch64-unknown-linux-gnu --release
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: libcamera-examples-aarch64
          path: |
            target/aarch64-unknown-linux-gnu/release/examples/list_cameras
            target/aarch64-unknown-linux-gnu/release/examples/capture
            target/aarch64-unknown-linux-gnu/release/examples/controls
  verify:
    name: Verify (Raspberry Pi)
    needs: build
    runs-on:
      group: Self
      labels: [self-hosted, linux, ARM64, Raspberry-Pi]
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: libcamera-examples-aarch64
      - name: Run list_cameras
        run: |
          chmod +x list_cameras
          ./list_cameras
      - name: Run controls
        run: |
          chmod +x controls
          ./controls

  slack_notify:
    needs: [build, verify]
    runs-on: ubuntu-slim
    timeout-minutes: 5
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: rust-oss
          notify_mode: failure_and_fixed
